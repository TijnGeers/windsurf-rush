<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#006994"/>
      <stop offset="100%" stop-color="#00bfff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Waves -->
  <path d="M0 340 Q64 300 128 330 T256 320 T384 330 T512 310 L512 512 L0 512Z" fill="url(#wave)" opacity="0.3"/>
  <path d="M0 370 Q64 340 128 360 T256 350 T384 360 T512 340 L512 512 L0 512Z" fill="url(#wave)" opacity="0.5"/>
  <path d="M0 400 Q64 370 128 390 T256 380 T384 390 T512 370 L512 512 L0 512Z" fill="url(#wave)" opacity="0.7"/>
  <!-- Surfboard -->
  <ellipse cx="256" cy="350" rx="70" ry="10" fill="#e8a430" transform="rotate(-10 256 350)"/>
  <!-- Surfer body -->
  <line x1="256" y1="280" x2="256" y2="330" stroke="#fce4c4" stroke-width="8" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="235" y1="300" x2="275" y2="295" stroke="#fce4c4" stroke-width="6" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="256" y1="330" x2="242" y2="348" stroke="#fce4c4" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="330" x2="268" y2="348" stroke="#fce4c4" stroke-width="6" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="256" cy="268" r="18" fill="#fce4c4"/>
  <!-- Sail -->
  <path d="M262 275 L262 200 L310 250Z" fill="rgba(255,255,255,0.85)" stroke="rgba(0,191,255,0.6)" stroke-width="2"/>
  <!-- Title text -->
  <text x="256" y="470" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="48" fill="white" letter-spacing="3">WINDSURF</text>
</svg>
